stages:
    - lint
    - test
    - deploy

variables:
    PRJ_PATH: '/root/ahv-modnix/ahv-monix-lp-be'

cache:
    key:
        files:
            - yarn.lock
    paths:
        - .yarn-cache/
        - node_modules/

check_lint:
    stage: lint
    image: node:20-alpine
    tags:
        - ahv-ldp
    script:
        - yarn install --cache-folder .yarn-cache --pure-lockfile
        - yarn lint
    rules:
        - if: $CI_PIPELINE_SOURCE == "merge_request_event"

run_unit_tests:
    stage: test
    image: node:20-alpine
    tags:
        - ahv-ldp
    script:
        - yarn install --cache-folder .yarn-cache --pure-lockfile
        - yarn test --ci --coverage
    coverage: '/All files\s*\|\s*([\d\.]+)/'
    artifacts:
        when: always
        paths:
            - junit.xml
            - coverage/
        reports:
            junit: junit.xml
            coverage_report:
                coverage_format: cobertura
                path: coverage/cobertura-coverage.xml
    rules:
        - if: $CI_PIPELINE_SOURCE == "merge_request_event"
        - if: $CI_COMMIT_BRANCH == "develop"

deploy_app:
    stage: deploy
    image: docker:24.0.5
    tags:
        - ahv-ldp
    script:
        - apk add --no-cache git # install git
        - git config --global --add safe.directory $PRJ_PATH
        - cd $PRJ_PATH
        - git reset --hard HEAD
        - git clean -fd
        - git pull https://gitlab-ci-token:${CI_JOB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git develop
        - echo "Deploying with Docker Compose..."
        - docker compose up -d --build
        - docker image prune -f # clear unuse image
    rules:
        - if: $CI_COMMIT_BRANCH == "develop"
